[tool.ruff]
line-length = 120
target-version = "py310"
# training/ is thesis-derived model code — style not enforced
# data_pipeline/ contains original dataset loading utilities
exclude = ["training/", "data_pipeline/"]

[tool.ruff.lint]
# E4: imports, E7: statements, E9: runtime errors, F: pyflakes (real bugs)
# I: isort, B: bugbear, UP: pyupgrade, SIM: simplify
select = ["E4", "E7", "E9", "F", "I", "B", "UP", "SIM"]
ignore = [
    "E501",   # line too long — handled case-by-case
    "B008",   # function call in default arg (FastAPI Depends() pattern)
    "SIM108", # ternary not always clearer than if/else
]

[tool.ruff.lint.per-file-ignores]
"scripts/*.py" = ["T201"]   # print() is intentional in one-off scripts
"tests/*.py" = ["B011"]     # assert False is fine in tests

[tool.ruff.lint.isort]
known-first-party = ["serving", "rag", "data_pipeline", "training", "tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
