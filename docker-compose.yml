services:

  # ── Traefik (reverse proxy / Blue-Green traffic router) ───
  # 所有外部流量經 port 80 進入，由 Traefik 根據 container label 決定路由
  # Dashboard: http://localhost:8888
  traefik:
    image: traefik:v3.0
    container_name: mlops_traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"   # 只有加 label 的 container 才被路由
      - "--providers.docker.network=mlops_net"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"
    ports:
      - "80:80"       # API 入口（取代舊的 8000）
      - "8888:8080"   # Traefik dashboard（避免與 Airflow 8080 衝突）
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - mlops_net

  # ── Database ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mlops_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlops}
      POSTGRES_DB: ${POSTGRES_DB:-mlops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - mlops_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Serving (Blue) ────────────────────────────────────────
  # 平時只跑 serve_blue，外部流量由 Traefik 路由（port 80）
  # Blue-Green 切換流程：
  #   1. docker compose --profile green up -d serve_green  ← GREEN 起來，priority=100 搶佔路由
  #   2. health check serve_green（內網直連確認）
  #   3. docker stop mlops_serve_blue                      ← BLUE 消失，GREEN 獨自服務
  serve_blue:
    build:
      context: .
      dockerfile: docker/serve.Dockerfile
    container_name: mlops_serve_blue
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgres:5432/${POSTGRES_DB:-mlops}
      MODEL_PATH: /models/best_model.pt
      MODEL_ARGS_PATH: /models/model_args.pkl
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-models/gemini-2.5-flash}
    volumes:
      - ./models:/models
    networks:
      - mlops_net
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mlops-blue.rule=PathPrefix(`/`)"
      - "traefik.http.routers.mlops-blue.entrypoints=web"
      - "traefik.http.routers.mlops-blue.priority=1"
      - "traefik.http.services.mlops-blue.loadbalancer.server.port=8000"

  # GREEN：priority=100，啟動後立即搶佔 Traefik 路由（不需改任何設定）
  serve_green:
    build:
      context: .
      dockerfile: docker/serve.Dockerfile
    container_name: mlops_serve_green
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgres:5432/${POSTGRES_DB:-mlops}
      MODEL_PATH: /models/best_model.pt
      MODEL_ARGS_PATH: /models/model_args.pkl
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-models/gemini-2.5-flash}
    volumes:
      - ./models:/models
    networks:
      - mlops_net
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - green
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mlops-green.rule=PathPrefix(`/`)"
      - "traefik.http.routers.mlops-green.entrypoints=web"
      - "traefik.http.routers.mlops-green.priority=100"
      - "traefik.http.services.mlops-green.loadbalancer.server.port=8000"

  # ── Training ──────────────────────────────────────────────
  # 不常駐，由 Airflow 排程觸發（或手動 docker compose run train）
  train:
    build:
      context: .
      dockerfile: docker/train.Dockerfile
    container_name: mlops_train
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgres:5432/${POSTGRES_DB:-mlops}
      MODEL_OUTPUT_PATH: /models/best_model.pt
      MODEL_PATH: /models/best_model.pt
      MODEL_ARGS_PATH: /models/model_args.pkl
    volumes:
      - ${MLOPS_PROJECT_DIR}/models:/models  # 用絕對路徑避免 Docker socket 路徑解析問題
      - ${MLOPS_PROJECT_DIR}/data:/app/data  # 供需要讀原始資料的腳本使用
    networks:
      - mlops_net
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - train                         # 預設不啟動，避免佔用資源

  # ── Airflow ───────────────────────────────────────────────
  airflow:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    container_name: mlops_airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MLOPS_PROJECT_DIR: ${MLOPS_PROJECT_DIR}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/opt/airflow/project                     # 讓 Airflow 能執行 docker compose
      - ./models:/models                           # 讓 Airflow 能 backup model 檔案
      - /var/run/docker.sock:/var/run/docker.sock  # 讓 Airflow 能控制 Docker
    ports:
      - "8080:8080"
    networks:
      - mlops_net
    depends_on:
      postgres:
        condition: service_healthy
    command: standalone

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: mlops_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - mlops_net
    depends_on:
      - postgres

volumes:
  postgres_data:
  grafana_data:

networks:
  mlops_net:
    driver: bridge
