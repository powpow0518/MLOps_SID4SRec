name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff==0.4.10

      # Only lint production code — training/ is thesis-derived, excluded in pyproject.toml
      - name: Run ruff
        run: ruff check serving/ rag/ scripts/

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: |
          pip install pytest sqlalchemy pydantic

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Docker Build ─────────────────────────────────────────────────────────────
  # Only runs on push to main (not on every PR) — base images are large
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build serve image
        run: docker build -f docker/serve.Dockerfile -t mlops-serve:ci .

      - name: Build train image
        run: docker build -f docker/train.Dockerfile -t mlops-train:ci .
